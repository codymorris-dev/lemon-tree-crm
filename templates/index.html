<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lemon Tree Bookkeeping — Lead CRM</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────────────── -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="brand-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="18" cy="20" rx="10" ry="12" fill="#F4D03F"/>
          <ellipse cx="18" cy="20" rx="10" ry="12" fill="url(#lemon-grad)"/>
          <path d="M18 8 Q22 2 28 4 Q24 10 18 8Z" fill="#52B788"/>
          <path d="M18 8 Q21 5 25 6" stroke="#2D6A4F" stroke-width="1.2" fill="none"/>
          <defs>
            <linearGradient id="lemon-grad" x1="10" y1="10" x2="28" y2="30">
              <stop offset="0%" stop-color="#F7DC6F"/>
              <stop offset="100%" stop-color="#D4AC0D"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Lemon Tree Bookkeeping</span>
        <span class="brand-sub">St. Petersburg, FL &nbsp;·&nbsp; Lead CRM</span>
      </div>
    </div>
    <div class="navbar-actions">
      <button class="btn btn-ghost" onclick="openAddModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Lead
      </button>
      <button class="btn btn-ghost" onclick="exportCSV()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────── -->
  <main class="main-content">

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card stat-total">
        <div class="stat-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-number" id="stat-total">—</div>
          <div class="stat-label">Total Leads</div>
        </div>
      </div>
      <div class="stat-card stat-new">
        <div class="stat-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-number" id="stat-new">—</div>
          <div class="stat-label">New</div>
        </div>
      </div>
      <div class="stat-card stat-contacted">
        <div class="stat-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.48 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16a2 2 0 0 1 .27.92Z"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-number" id="stat-contacted">—</div>
          <div class="stat-label">Contacted</div>
        </div>
      </div>
      <div class="stat-card stat-interested">
        <div class="stat-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-number" id="stat-interested">—</div>
          <div class="stat-label">Interested</div>
        </div>
      </div>
      <div class="stat-card stat-converted">
        <div class="stat-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="stat-body">
          <div class="stat-number" id="stat-converted">—</div>
          <div class="stat-label">Converted</div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search by name, address, or phone…"
          oninput="filterLeads()"
        />
      </div>
      <div class="filter-selects">
        <select id="filter-status" class="filter-select" onchange="filterLeads()">
          <option value="">All Statuses</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="interested">Interested</option>
          <option value="converted">Converted</option>
        </select>
        <select id="filter-type" class="filter-select" onchange="filterLeads()">
          <option value="">All Types</option>
        </select>
        <select id="filter-contacted" class="filter-select" onchange="filterLeads()">
          <option value="">All Leads</option>
          <option value="true">Contacted Only</option>
          <option value="false">Not Contacted</option>
        </select>
      </div>
      <div class="results-count" id="results-count"></div>
    </div>

    <!-- Table -->
    <div class="table-container">
      <table class="leads-table">
        <thead>
          <tr>
            <th class="col-sort" onclick="sortBy('name')">Business Name <span class="sort-icon" id="sort-name"></span></th>
            <th class="col-sort" onclick="sortBy('business_type')">Type <span class="sort-icon" id="sort-business_type"></span></th>
            <th>Phone</th>
            <th>Website</th>
            <th class="col-sort" onclick="sortBy('status')">Status <span class="sort-icon" id="sort-status"></span></th>
            <th>Contacted</th>
            <th class="col-sort" onclick="sortBy('created_at')">Added <span class="sort-icon" id="sort-created_at"></span></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leads-tbody">
          <tr><td colspan="8" class="loading-state">Loading leads…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <!-- ── Edit / View Modal ────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-header-left">
          <span class="modal-type-badge" id="modal-type-badge"></span>
          <h2 class="modal-title" id="modal-title">Business Name</h2>
        </div>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <!-- Left: Info -->
        <div class="modal-info-panel">
          <h3 class="panel-heading">Business Info</h3>
          <div class="info-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span id="modal-address">—</span>
          </div>
          <div class="info-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.48 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16a2 2 0 0 1 .27.92Z"/></svg>
            <span id="modal-phone">—</span>
          </div>
          <div class="info-item" id="modal-website-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <a id="modal-website" href="#" target="_blank">—</a>
          </div>
          <div class="info-item" id="modal-rating-row" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
            <span id="modal-rating">—</span>
          </div>
          <div class="info-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span id="modal-date">—</span>
          </div>

          <div class="modal-divider"></div>
          <h3 class="panel-heading">Update Status</h3>

          <div class="form-group">
            <label class="form-label">Pipeline Status</label>
            <select id="modal-status" class="form-select" onchange="updateStatusBadge()">
              <option value="new">New</option>
              <option value="contacted">Contacted</option>
              <option value="interested">Interested</option>
              <option value="converted">Converted</option>
            </select>
          </div>

          <div class="form-group">
            <label class="toggle-label">
              <div class="toggle-wrap">
                <input type="checkbox" id="modal-contacted" class="toggle-input" />
                <span class="toggle-track"></span>
              </div>
              <span>Marked as Contacted</span>
            </label>
          </div>
        </div>

        <!-- Right: Notes -->
        <div class="modal-notes-panel">
          <h3 class="panel-heading">Notes</h3>
          <textarea
            id="modal-notes"
            class="notes-textarea"
            placeholder="Add notes about this lead — last contact date, what they said, next steps…"
          ></textarea>
          <div class="char-count" id="char-count"></div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteLead()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Delete
        </button>
        <div class="modal-footer-right">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveLead()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Add Lead Modal ───────────────────────────────────────────────── -->
  <div class="modal-overlay" id="add-modal-overlay" onclick="closeAddModal()">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">Add Lead Manually</h2>
        <button class="modal-close" onclick="closeAddModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body modal-body-form">
        <div class="form-group">
          <label class="form-label">Business Name <span class="required">*</span></label>
          <input type="text" id="add-name" class="form-input" placeholder="e.g. Suncoast Cafe" />
        </div>
        <div class="form-group">
          <label class="form-label">Business Type</label>
          <input type="text" id="add-type" class="form-input" placeholder="e.g. Restaurant" />
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" id="add-address" class="form-input" placeholder="123 Main St, St. Petersburg, FL" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" id="add-phone" class="form-input" placeholder="(727) 555-0100" />
        </div>
        <div class="form-group">
          <label class="form-label">Website</label>
          <input type="url" id="add-website" class="form-input" placeholder="https://..." />
        </div>
      </div>
      <div class="modal-footer">
        <div></div>
        <div class="modal-footer-right">
          <button class="btn btn-outline" onclick="closeAddModal()">Cancel</button>
          <button class="btn btn-primary" onclick="createLead()">Add Lead</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
